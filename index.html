<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Dashboard v5.3 | Regional Clusters</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --panay: #0ea5e9; --mindanao: #f59e0b;
            --bg: #f1f5f9; --white: #ffffff; --text: #1e293b;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding: 20px; color: var(--text); }
        .container { max-width: 1550px; margin: 0 auto; background: var(--white); padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        
        /* Batch Summary Styles */
        .batch-summary { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .batch-badge { background: #e2e8f0; padding: 8px 15px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; border: 1px solid #cbd5e1; display: flex; align-items: center; gap: 5px; }
        .batch-badge span { color: var(--text); font-weight: 800; }
        .batch-badge.b-panay { border-left: 5px solid var(--panay); background: #e0f2fe; }
        .batch-badge.b-mindanao { border-left: 5px solid var(--mindanao); background: #fef3c7; }

        .source-switcher { display: flex; gap: 10px; background: #e2e8f0; padding: 5px; border-radius: 50px; margin-bottom: 20px; width: fit-content; }
        .source-pill { padding: 10px 20px; border-radius: 50px; border: none; font-weight: 800; font-size: 0.75rem; cursor: pointer; color: #64748b; background: transparent; transition: 0.3s; }
        .source-pill.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #f8fafc; padding: 20px; border-radius: 18px; border: 1px solid #e2e8f0; border-bottom: 4px solid #cbd5e1; }
        .stat-card.active-source { border-bottom-color: var(--primary); background: #f0f4ff; }
        .stat-card h3 { font-size: 1.5rem; margin-top: 5px; }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        select, input { padding: 12px; border-radius: 10px; border: 1.5px solid #cbd5e1; outline: none; font-size: 0.85rem; }

        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: #475569; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        
        .tag { padding: 3px 8px; border-radius: 5px; font-size: 0.6rem; font-weight: 900; color: white; text-transform: uppercase; }
        .tag-panay { background: var(--panay); }
        .tag-mindanao { background: var(--mindanao); }
        .tag-original { background: var(--primary); }
        
        .btn-sync { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-export { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <div>
            <h2>Admin Master Panel v5.3</h2>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 5px;">B3: Panay | B4: Mindanao Enforcement</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="fetchAllData()" class="btn-sync" id="syncBtn">🔄 Sync All</button>
            <button onclick="exportToCSV()" class="btn-export">📥 Export CSV</button>
        </div>
    </div>

    <div class="source-switcher">
        <button class="source-pill active" onclick="switchSource('original', this)">📁 MASTER</button>
        <button class="source-pill" onclick="switchSource('panay', this)">🏝️ PANAY</button>
        <button class="source-pill" onclick="switchSource('mindanao', this)">⛰️ MINDANAO</button>
    </div>

    <div class="batch-summary" id="batchSummary">
        <div class="batch-badge">B1: <span id="count-b1">0</span></div>
        <div class="batch-badge">B2: <span id="count-b2">0</span></div>
        <div class="batch-badge b-panay">B3 (PANAY): <span id="count-b3">0</span></div>
        <div class="batch-badge b-mindanao">B4 (MINDANAO): <span id="count-b4">0</span></div>
        <div class="batch-badge">B5: <span id="count-b5">0</span></div>
        <div class="batch-badge">B6: <span id="count-b6">0</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card" id="card-original"><small>Master</small><h3 id="stat-orig-count">0</h3></div>
        <div class="stat-card" id="card-panay"><small>Panay (B3)</small><h3 id="stat-pan-count">0</h3></div>
        <div class="stat-card" id="card-mindanao"><small>Mindanao (B4)</small><h3 id="stat-min-count">0</h3></div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Search Teacher</label>
            <input type="text" id="searchInput" placeholder="Name or School..." onkeyup="applyFilters()">
        </div>
        <div class="control-group">
            <label>Batch</label>
            <select id="batchFilter" onchange="applyFilters()">
                <option value="">All Batches</option>
                <option value="batch1">Batch 1</option>
                <option value="batch2">Batch 2</option>
                <option value="batch3">Batch 3 (Panay)</option>
                <option value="batch4">Batch 4 (Mindanao)</option>
                <option value="batch5">Batch 5</option>
                <option value="batch6">Batch 6</option>
            </select>
        </div>
        <div class="control-group">
            <label>Workshop Day</label>
            <select id="dayFilter" onchange="applyFilters()">
                <option value="">All Days</option>
                <option value="D1-">Day 1</option>
                <option value="D2-">Day 2</option>
                <option value="D3-">Day 3</option>
                <option value="D4-">Day 4</option>
                <option value="D5-">Day 5</option>
            </select>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Gender</th>
                    <th>Institution</th>
                    <th>Province</th>
                    <th>Batch</th>
                    <th>Cluster</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const URLS = {
        panay: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSNs_RBN6sLDKG1GdPw-zAUBQc94_EVztntR4kWCmkebFUATHQalopVuzhlEBCBeJ0nNki8zn75pPTU/pub?output=csv',
        mindanao: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROJBuC8QcVYdbkOWg7UlUhVAgnFOSa9i7p7HRGgABYIPdsxw31MEx0fzBrkH5I1_k2-mSDf6Y2itVJ/pub?output=csv',
        original: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJEJuWYBbbEtvlroXnqVtjt2V4Ev_F8iT4HR0Pi419O1xEgD4VDfFcyuaT1XiMmG6AZtX8yR5euWyc/pub?output=csv'
    };

    let datasets = { original: [], panay: [], mindanao: [] };
    let filteredData = [];
    let activeSource = 'original';

    async function fetchCSV(url, key) {
        const response = await fetch(url + '&t=' + Date.now());
        const text = await response.text();
        const rows = text.split('\n').filter(r => r.trim() !== "");
        const headers = rows[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
        
        return rows.slice(1).map(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
            const rawBatch = (cols[headers.indexOf('schedule')] || '').toLowerCase().replace(/\s/g, '');
            
            // Logic Enforcement: Force Cluster based on Batch or Source
            let assignedCluster = key;
            if (rawBatch === 'batch3') assignedCluster = 'panay';
            if (rawBatch === 'batch4') assignedCluster = 'mindanao';

            return {
                firstname: cols[headers.indexOf('firstname')] || '',
                lastname: cols[headers.indexOf('lastname')] || '',
                mi: cols[headers.indexOf('mi')] || '',
                suffix: cols[headers.indexOf('suffix')] || '',
                gender: cols[headers.indexOf('gender')] || '',
                dob: cols[headers.indexOf('dob')] || '',
                province: cols[headers.indexOf('province')] || '',
                institution: cols[headers.indexOf('institution')] || '',
                batch: rawBatch,
                workshop: cols[headers.indexOf('workshop')] || '',
                cluster: assignedCluster
            };
        }).filter(d => d.firstname);
    }

    async function fetchAllData() {
        const btn = document.getElementById('syncBtn');
        btn.innerText = "Syncing...";
        try {
            const results = await Promise.all([
                fetchCSV(URLS.original, 'original'),
                fetchCSV(URLS.panay, 'panay'),
                fetchCSV(URLS.mindanao, 'mindanao')
            ]);
            datasets.original = results[0];
            datasets.panay = results[1];
            datasets.mindanao = results[2];

            document.getElementById('stat-orig-count').innerText = datasets.original.length;
            document.getElementById('stat-pan-count').innerText = datasets.panay.length;
            document.getElementById('stat-min-count').innerText = datasets.mindanao.length;
            
            applyFilters();
            btn.innerText = "🔄 Sync All";
        } catch (e) { btn.innerText = "❌ Error"; }
    }

    function switchSource(source, btn) {
        activeSource = source;
        document.querySelectorAll('.source-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-source'));
        document.getElementById(`card-${source}`).classList.add('active-source');
        applyFilters();
    }

    function updateBatchSummary() {
        const currentDataset = datasets[activeSource];
        const counts = { batch1: 0, batch2: 0, batch3: 0, batch4: 0, batch5: 0, batch6: 0 };
        
        currentDataset.forEach(d => {
            if (counts.hasOwnProperty(d.batch)) {
                counts[d.batch]++;
            }
        });

        document.getElementById('count-b1').innerText = counts.batch1;
        document.getElementById('count-b2').innerText = counts.batch2;
        document.getElementById('count-b3').innerText = counts.batch3;
        document.getElementById('count-b4').innerText = counts.batch4;
        document.getElementById('count-b5').innerText = counts.batch5;
        document.getElementById('count-b6').innerText = counts.batch6;
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const batch = document.getElementById('batchFilter').value;
        const day = document.getElementById('dayFilter').value;
        const tbody = document.getElementById('tableBody');
        
        updateBatchSummary();

        filteredData = datasets[activeSource].filter(d => {
            const fullName = (d.firstname + ' ' + d.lastname).toLowerCase();
            const matchesSearch = fullName.includes(search) || d.institution.toLowerCase().includes(search);
            const matchesBatch = batch === "" || d.batch === batch;
            const matchesDay = day === "" || d.workshop.toUpperCase().includes(day.toUpperCase());
            return matchesSearch && matchesBatch && matchesDay;
        });

        tbody.innerHTML = filteredData.map(d => {
            const displaySuffix = (d.suffix && d.suffix !== "None") ? ` ${d.suffix}` : "";
            const clusterClass = `tag-${d.cluster}`;
            return `
            <tr>
                <td>${d.firstname}</td>
                <td>${d.lastname}${displaySuffix}</td>
                <td><small>${d.gender}</small></td>
                <td>${d.institution}</td>
                <td>${d.province}</td>
                <td><span style="color:var(--primary); font-weight:800">${d.batch.toUpperCase()}</span></td>
                <td><span class="tag ${clusterClass}">${d.cluster}</span></td>
            </tr>
            `;
        }).join('');
    }

    function exportToCSV() {
        if (filteredData.length === 0) return alert("No data to export.");
        let csv = "\ufeffFirst Name,Last Name,Suffix,Middle I,Gender,Date of Birth,Province,Institution,Batch,Cluster\n";
        filteredData.forEach(d => {
            csv += `"${d.firstname}","${d.lastname}","${d.suffix}","${d.mi}","${d.gender}","${d.dob}","${d.province}","${d.institution}","${d.batch.toUpperCase()}","${d.cluster.toUpperCase()}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Regional_Master_Export_${activeSource}_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    fetchAllData();
</script>
</body>
</html>
