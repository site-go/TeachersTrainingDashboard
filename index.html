<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Teacher Training 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        h2 { margin: 0; font-weight: 800; border-left: 6px solid #6366f1; padding-left: 15px; }
        .action-buttons { display: flex; gap: 10px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        select, input { padding: 12px; border-radius: 10px; border: 1.5px solid #cbd5e1; font-family: inherit; font-size: 0.9rem; transition: border 0.2s; }
        .table-wrapper { overflow-x: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f1f5f9; color: #475569; padding: 15px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; vertical-align: top; }
        tr:hover { background: #fdfdff; }
        .badge-batch { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; background: #e0e7ff; color: #4338ca; white-space: nowrap; }
        .badge-time { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; margin: 2px; line-height: 1.4; }
        .am { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; } 
        .pm { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; } 
        .btn-refresh { padding: 10px 20px; background: #6366f1; color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer; }
        .btn-import { padding: 10px 20px; background: #1e293b; color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer; }
        .btn-export { padding: 10px 20px; background: #10b981; color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer; }
        .btn-clear { background: #64748b; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-top: auto; }
        .loading { text-align: center; padding: 50px; font-weight: 800; color: #6366f1; }
        .stats-bar { display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.85rem; font-weight: 700; color: #6366f1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>Live Enrollment Dashboard</h2>
        <div class="action-buttons">
            <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="handleImport(event)">
            <button onclick="document.getElementById('csvFileInput').click()" class="btn-import">📥 Import CSV</button>
            <button onclick="exportToCSV()" class="btn-export">📤 Export Detailed CSV</button>
            <button onclick="fetchData()" class="btn-refresh">↻ Refresh Live</button>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Search Teacher</label>
            <input type="text" id="searchInput" placeholder="Search name..." onkeyup="filterData()">
        </div>
        <div class="control-group">
            <label>Batch</label>
            <select id="batchFilter" onchange="filterData()">
                <option value="">All Batches</option>
                <option value="batch1">Batch 1</option>
                <option value="batch2">Batch 2</option>
                <option value="batch3">Batch 3</option>
                <option value="batch4">Batch 4</option>
                <option value="batch5">Batch 5</option>
                <option value="batch6">Batch 6</option>
            </select>
        </div>
        <div class="control-group">
            <label>Filter by Day</label>
            <select id="dayFilter" onchange="filterData()">
                <option value="">All Days</option>
                <option value="D1-">Day 1</option>
                <option value="D2-">Day 2</option>
                <option value="D3-">Day 3</option>
                <option value="D4-">Day 4</option>
                <option value="D5-">Day 5</option>
            </select>
        </div>
        <div class="control-group">
            <label>Time</label>
            <select id="timeFilter" onchange="filterData()">
                <option value="">AM & PM</option>
                <option value="-AM-">Morning (AM)</option>
                <option value="-PM-">Afternoon (PM)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Topic</label>
            <select id="topicFilter" onchange="filterData()">
                <option value="">All Topics</option>
                <optgroup label="Day 1">
                    <option value="D1-AM-ICT-Essentials">D1 AM: ICT Essentials</option>
                    <option value="D1-PM-Scratch-Jr">D1 PM: Scratch Jr</option>
                </optgroup>
                </select>
        </div>
        <button onclick="clearFilters()" class="btn-clear">Clear All</button>
    </div>

    <div class="stats-bar">
        <span>Showing: <span id="countVal">0</span> Records</span>
    </div>

    <div id="loading" class="loading" style="display: none;">Syncing Database...</div>

    <div class="table-wrapper">
        <table id="regTable">
            <thead>
                <tr>
                    <th>Teacher Name</th>
                    <th>Institution</th>
                    <th>Gender/DOB</th>
                    <th>Batch</th>
                    <th>Selected Sessions</th>
                    <th>Contact</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzPYE0mntbLD0QoxnxwmUH_ozKFmotfXGCt7kiF3cO5rGGkuN-6PIzon8YcxC833D6U/exec'; 
    let allData = [];
    let filteredForExport = [];

    const ALL_WORKSHOP_TOPICS = [
        "D1-AM-ICT-Essentials", "D1-AM-ICT-Computer-Fundamentals", "D1-AM-Scratch-mBlock", "D1-AM-Productivity-Tools", "D1-PM-Scratch-Jr", "D1-PM-Web-Design", "D1-PM-Inkscape",
        "D2-AM-PowerPoint", "D2-AM-Video-Creation", "D2-AM-Java-Intro", "D2-PM-HTML-Basics", "D2-PM-Python", "D2-PM-ECommerce",
        "D3-AM-Multimedia", "D3-AM-Media-Literacy", "D3-AM-Java-GUI", "D3-PM-Arduino-Intro", "D3-PM-RoboStarter", "D3-PM-RoboPrime-1", "D3-PM-RoboJuno-1",
        "D4-AM-Arduino-Exp", "D4-AM-Codey-Rocky", "D4-AM-mBot2-Assemble", "D4-PM-Arduino-Circuits", "D4-PM-MicroBit",
        "D5-AM-Arduino-R4", "D5-AM-MicroBit-Scratch", "D5-AM-mBot2-Manual", "D5-PM-Arduino-IoT", "D5-PM-RingBit", "D5-PM-mBot2-Auto"
    ];

    function cleanEncoding(str) {
        if (!str) return "";
        return str.toString().replace(/\s+/g, ' ').trim();
    }

    async function fetchData() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(scriptURL);
            allData = await response.json();
            filterData();
        } catch (error) {
            document.getElementById('loading').innerHTML = "⚠️ Error: Connection Failed.";
        }
    }

    function handleImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const rows = content.split("\n");
            if (rows.length < 2) return alert("Invalid CSV.");
            const headers = rows[0].split(",").map(h => h.trim().toLowerCase().replace(/"/g, ''));
            allData = rows.slice(1).map(row => {
                const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (values.length < 2) return null;
                let obj = {};
                headers.forEach((header, i) => { obj[header] = values[i] ? values[i].replace(/"/g, '').trim() : ""; });
                return obj;
            }).filter(item => item !== null);
            filterData();
        };
        reader.readAsText(file);
    }

    // --- UPDATED EXPORT LOGIC ---
    function exportToCSV() {
        if (filteredForExport.length === 0) return alert("No records to export.");

        let csvRows = [];
        // Definitive order requested: First Name, Last Name, MI, Suffix, DOB, Gender, Mobile, Email
        let headers = ["First Name", "Last Name", "MI", "Suffix", "Date of Birth", "Gender", "Mobile Number", "Email", "Institution", "Province", "Batch", "Specialization"];
        headers = headers.concat(ALL_WORKSHOP_TOPICS);
        csvRows.push(headers.join(","));

        filteredForExport.forEach(teacher => {
            let rowData = [
                `"${cleanEncoding(teacher.firstname || '')}"`,
                `"${cleanEncoding(teacher.lastname || '')}"`,
                `"${cleanEncoding(teacher.mi || '')}"`,
                `"${cleanEncoding(teacher.suffix || '')}"`,
                `"${teacher.dob || ''}"`,
                `"${teacher.gender || ''}"`,
                `"${teacher.mobile || ''}"`,
                `"${teacher.email || ''}"`,
                `"${cleanEncoding(teacher.institution || '')}"`,
                `"${cleanEncoding(teacher.province || '')}"`,
                `"${(teacher.schedule || '').toUpperCase()}"`,
                `"${cleanEncoding(teacher.specialization || '')}"`
            ];

            const teacherTopicStr = (teacher.workshop || teacher.topic || "").toString().toUpperCase();
            ALL_WORKSHOP_TOPICS.forEach(topic => {
                rowData.push(teacherTopicStr.includes(topic.toUpperCase()) ? `"${topic}"` : '""');
            });
            csvRows.push(rowData.join(","));
        });

        const csvString = "\ufeff" + csvRows.join("\n");
        const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", `Detailed_Export_${new Date().toISOString().slice(0,10)}.csv`);
        link.click();
    }

    function renderTable(data, specificTopicTerm = "") {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        filteredForExport = [];
        let rowCount = 0;

        data.forEach(teacher => {
            const topicString = (teacher.workshop || teacher.topic || "").toString();
            const allTopicsArray = topicString.split(', ').filter(t => t.length > 0);

            let filteredTopics = allTopicsArray;
            if (specificTopicTerm !== "") {
                filteredTopics = allTopicsArray.filter(t => t.toUpperCase().includes(specificTopicTerm.toUpperCase()));
            }

            if (filteredTopics.length > 0) {
                rowCount++;
                filteredForExport.push(teacher);
                const topicBadges = filteredTopics.map(t => {
                    const isPM = t.toUpperCase().includes("-PM-") || t.toUpperCase().includes("AFTERNOON");
                    return `<span class="badge-time ${isPM ? 'pm' : 'am'}">${cleanEncoding(t)}</span>`;
                }).join('');

                const row = `<tr>
                    <td><strong>${cleanEncoding(teacher.fullname) || 'N/A'}</strong><br><small style="color:#64748b">${cleanEncoding(teacher.specialization)}</small></td>
                    <td>${cleanEncoding(teacher.institution)}</td>
                    <td><small>${teacher.gender || ''}<br>${teacher.dob || ''}</small></td>
                    <td><span class="badge-batch">${(teacher.schedule || '').toUpperCase()}</span></td>
                    <td style="max-width:380px;">${topicBadges}</td>
                    <td><small>${teacher.mobile || ''}<br>${teacher.email || ''}</small></td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            }
        });

        document.getElementById('countVal').innerText = rowCount;
        document.getElementById('loading').style.display = 'none';
    }

    function filterData() {
        const nameTerm = document.getElementById('searchInput').value.toLowerCase();
        const batchTerm = document.getElementById('batchFilter').value;
        const dayTerm = document.getElementById('dayFilter').value;
        const timeTerm = document.getElementById('timeFilter').value;
        const topicTerm = document.getElementById('topicFilter').value;

        const filtered = allData.filter(teacher => {
            const topicStr = (teacher.workshop || teacher.topic || "").toString().toUpperCase();
            const matchesName = (teacher.fullname || "").toLowerCase().includes(nameTerm);
            const matchesBatch = batchTerm === "" || teacher.schedule === batchTerm;
            const matchesDay = dayTerm === "" || topicStr.includes(dayTerm.toUpperCase());
            const matchesTime = timeTerm === "" || topicStr.includes(timeTerm.toUpperCase());
            const matchesTopic = topicTerm === "" || topicStr.includes(topicTerm.toUpperCase());
            return matchesName && matchesBatch && matchesDay && matchesTime && matchesTopic;
        });

        renderTable(filtered, topicTerm);
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('batchFilter').value = '';
        document.getElementById('dayFilter').value = '';
        document.getElementById('timeFilter').value = '';
        document.getElementById('topicFilter').value = '';
        filterData();
    }

    fetchData();
</script>

</body>
</html>
